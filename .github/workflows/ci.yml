# .github/workflows/ci.yml
# CI Pipeline — LRA AI Platform
# Runs on every push and PR to main.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install flake8 pyyaml

      - name: Lint Python files
        run: |
          flake8 agents/ core/ tools/ cli/ api/ \
            --max-line-length=100 \
            --exclude=__pycache__ \
            --count --statistics
        continue-on-error: true

      - name: Validate YAML configs
        run: |
          python -c "
          import yaml
          import glob
          files = glob.glob('config/**/*.yaml', recursive=True)
          for f in files:
              with open(f) as fh:
                  yaml.safe_load(fh)
              print(f'OK: {f}')
          print(f'Validated {len(files)} YAML files.')
          "

      - name: Check Python syntax
        run: |
          python -m compileall agents/ core/ tools/ cli/ api/ -q
          echo "✓ All Python files compile successfully"

  structure:
    name: Project Structure Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          files=(
            "README.md"
            "requirements.txt"
            ".env.example"
            "Makefile"
            "config/agents.yaml"
            "config/tools.yaml"
            "config/config.yaml"
            "core/supervisor.py"
            "core/governance_engine.py"
            "cli/lra.py"
            "api/app.py"
          )
          for f in "${files[@]}"; do
            if [ -f "$f" ]; then
              echo "✓ $f"
            else
              echo "✗ MISSING: $f"
              exit 1
            fi
          done

      - name: Check agents exist
        run: |
          agents=(
            "agents/founder_agent.py"
            "agents/cloud_architect_agent.py"
            "agents/devops_agent.py"
            "agents/security_agent.py"
            "agents/sre_agent.py"
            "agents/openshift_agent.py"
            "agents/documentation_agent.py"
            "agents/reviewer_agent.py"
          )
          for a in "${agents[@]}"; do
            if [ -f "$a" ]; then
              echo "✓ $a"
            else
              echo "✗ MISSING: $a"
              exit 1
            fi
          done