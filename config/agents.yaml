# config/agents.yaml
# Registro de todos los agentes de LRA AI Platform.
# Solo incluye tools que tienen implementación real.

agents:
  founder:
    name: "Founder Agent"
    role: "Project Initializer"
    description: "Inicializa proyectos nuevos y genera la estructura base."
    active: true
    tools:
      - github

  cloud_architect:
    name: "Cloud Architect"
    role: "Architecture Designer"
    description: "Diseña y revisa arquitecturas cloud multi-proveedor."
    active: true
    tools:
      - aws
      - azure
      - gcp
      - github

  devops:
    name: "DevOps Engineer"
    role: "Automation Specialist"
    description: "Gestiona infraestructura, Kubernetes y automatización."
    active: true
    tools:
      - terraform
      - kubernetes
      - ansible
      - github

  security:
    name: "Security Engineer"
    role: "Security Specialist"
    description: "Analiza vulnerabilidades y revisa configuraciones IaC."
    active: true
    tools:
      - trivy
      - checkov
      - github

  sre:
    name: "SRE"
    role: "Reliability Engineer"
    description: "Gestiona observabilidad, alertas y fiabilidad."
    active: true
    tools:
      - cloudwatch
      - prometheus
      - grafana

  openshift:
    name: "OpenShift Agent"
    role: "OpenShift Specialist"
    description: "Gestiona clusters OpenShift, Operators y Pipelines."
    active: true
    tools:
      - openshift
      - kubernetes
      - github

  documentation:
    name: "Documentation Agent"
    role: "Technical Writer"
    description: "Genera y mantiene README, ADR, Runbooks y Architecture docs."
    active: true
    tools:
      - github
      - local
  reviewer:
    name: "Reviewer"
    role: "Code Reviewer"
    description: "Revisa Pull Requests analizando calidad y seguridad."
    active: true
    tools:
      - github
      - trivy
      - checkov
