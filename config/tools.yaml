# config/tools.yaml
# Catálogo de todas las tools de LRA AI Platform.

tools:

  # Version Control
  github:
    name: "GitHub Tool"
    category: "vcs"
    path: "tools/vcs/github"
    active: true
    actions:
      - create_repo
      - clone_repo
      - create_branch
      - create_pr
      - merge_pr
      - review_pr
      - create_issue
      - list_repos
      - get_file
      - create_file
      - update_file

  # Cloud Providers
  aws:
    name: "AWS Tool"
    category: "cloud"
    path: "tools/cloud/aws"
    active: true
    actions:
      - create_eks_cluster
      - create_vpc
      - create_s3_bucket
      - create_rds
      - create_ecr
      - deploy_lambda
      - create_iam_role
      - describe_instances
      - create_cloudwatch_alarm

  azure:
    name: "Azure Tool"
    category: "cloud"
    path: "tools/cloud/azure"
    active: true
    actions:
      - create_aks_cluster
      - create_vnet
      - create_storage
      - create_function
      - create_key_vault

  gcp:
    name: "GCP Tool"
    category: "cloud"
    path: "tools/cloud/gcp"
    active: true
    actions:
      - create_gke_cluster
      - create_vpc
      - create_storage
      - create_cloud_run

  vmware:
    name: "VMware Tool"
    category: "cloud"
    path: "tools/cloud/vmware"
    active: false
    actions:
      - create_vm
      - list_vms
      - start_vm
      - stop_vm

  # Containers
  docker:
    name: "Docker Tool"
    category: "containers"
    path: "tools/containers/docker"
    active: true
    actions:
      - build_image
      - push_image
      - pull_image
      - run_container
      - list_containers
      - stop_container

  kubernetes:
    name: "Kubernetes Tool"
    category: "containers"
    path: "tools/containers/kubernetes"
    active: true
    actions:
      - apply_manifest
      - delete_manifest
      - get_pods
      - get_services
      - get_deployments
      - scale_deployment
      - get_logs
      - exec_command

  openshift:
    name: "OpenShift Tool"
    category: "containers"
    path: "tools/containers/openshift"
    active: true
    actions:
      - create_project
      - deploy_app
      - install_operator
      - get_routes
      - apply_manifest

  helm:
    name: "Helm Tool"
    category: "containers"
    path: "tools/containers/helm"
    active: true
    actions:
      - install_chart
      - upgrade_chart
      - uninstall_chart
      - list_releases
      - add_repo

  podman:
    name: "Podman Tool"
    category: "containers"
    path: "tools/containers/podman"
    active: false
    actions:
      - build_image
      - run_container

  buildah:
    name: "Buildah Tool"
    category: "containers"
    path: "tools/containers/buildah"
    active: false
    actions:
      - build_image
      - push_image

  skopeo:
    name: "Skopeo Tool"
    category: "containers"
    path: "tools/containers/skopeo"
    active: false
    actions:
      - copy_image
      - inspect_image

  # IaC
  terraform:
    name: "Terraform Tool"
    category: "iac"
    path: "tools/iac/terraform"
    active: true
    actions:
      - init
      - plan
      - apply
      - destroy
      - validate
      - format

  ansible:
    name: "Ansible Tool"
    category: "iac"
    path: "tools/iac/ansible"
    active: true
    actions:
      - run_playbook
      - run_adhoc
      - list_inventory
      - check_syntax
      - encrypt_vault
      - decrypt_vault

  ansible_automation_platform:
    name: "Ansible Automation Platform Tool"
    category: "iac"
    path: "tools/iac/ansible_automation_platform"
    active: false
    actions:
      - launch_job_template
      - list_job_templates

  vagrant:
    name: "Vagrant Tool"
    category: "iac"
    path: "tools/iac/vagrant"
    active: false
    actions:
      - up
      - halt
      - destroy

  # CI/CD
  jenkins:
    name: "Jenkins Tool"
    category: "cicd"
    path: "tools/cicd/jenkins"
    active: true
    actions:
      - trigger_job
      - get_job_status
      - get_build_log
      - list_jobs

  argocd:
    name: "ArgoCD Tool"
    category: "cicd"
    path: "tools/cicd/argocd"
    active: true
    actions:
      - sync_app
      - get_app_status
      - create_app
      - list_apps
      - rollback_app

  sonarqube:
    name: "SonarQube Tool"
    category: "cicd"
    path: "tools/cicd/sonarqube"
    active: true
    actions:
      - scan_project
      - get_quality_gate
      - list_issues

  nexus:
    name: "Nexus Tool"
    category: "cicd"
    path: "tools/cicd/nexus"
    active: true
    actions:
      - upload_artifact

  # Security
  trivy:
    name: "Trivy Tool"
    category: "security"
    path: "tools/security/trivy"
    active: true
    actions:
      - scan_image
      - scan_filesystem
      - scan_kubernetes
      - scan_terraform

  checkov:
    name: "Checkov Tool"
    category: "security"
    path: "tools/security/checkov"
    active: true
    actions:
      - scan_terraform
      - scan_kubernetes
      - scan_dockerfile
      - scan_github_actions

  # Observability
  cloudwatch:
    name: "CloudWatch Tool"
    category: "observability"
    path: "tools/observability/cloudwatch"
    active: true
    actions:
      - list_alarms
      - get_metric_statistics
      - list_log_groups
      - get_logs

  prometheus:
    name: "Prometheus Tool"
    category: "observability"
    path: "tools/observability/prometheus"
    active: true
    actions:
      - query
      - get_alerts
      - get_targets

  grafana:
    name: "Grafana Tool"
    category: "observability"
    path: "tools/observability/grafana"
    active: true
    actions:
      - list_dashboards
      - get_health
      - get_alerts
# Local filesystem
  local:
    name: "Local Tool"
    category: "local"
    path: "tools/local"
    active: true
    actions:
      - analyze_project
      - read_file
      - list_files
      - detect_stack
      - save_file