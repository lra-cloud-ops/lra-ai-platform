# config/config.yaml
# Configuración global de LRA AI Platform.
# Este archivo define la identidad y comportamiento de la plataforma.

platform:
  name: "LRA AI Platform"
  version: "1.0.0"
  organization: "LRA CloudOps"
  environment: "development"  # development | staging | production

# Directorio base de la plataforma
paths:
  agents: "agents"
  tools: "tools"
  knowledge: "knowledge"
  memory: "memory"
  logs: "logs"

# Configuración de logs
logging:
  level: "INFO"           # DEBUG | INFO | WARNING | ERROR
  format: "json"          # json | text
  file: "logs/platform.log"

# Configuración de la API
api:
  host: "0.0.0.0"
  port: 8000
  debug: false

# Configuración del modelo de IA
ai:
  provider: "anthropic"
  model: "claude-sonnet-4-6"
  max_tokens: 4096