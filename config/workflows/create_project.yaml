# config/workflows/create_project.yaml
# Workflow: create_project — v1.0
# Solo usa Tasks implementadas en FounderAgent (Fase 1).
# create_branch, run_tests, deploy etc. se añaden en Fase 3
# cuando DevOps Agent esté implementado.

name: create_project
description: "Crea un proyecto nuevo con repo y documentacion base"
keywords:
  - "crea un proyecto"
  - "crea una plataforma"
  - "nuevo proyecto"
  - "inicializa un proyecto"

tasks:
  - type: create_repository
    assigned_to: founder
    capability: create_repository

  - type: generate_documentation
    assigned_to: founder
    capability: generate_documentation
    depends_on: [create_repository]