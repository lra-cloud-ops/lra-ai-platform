# config/workflows/create_project.yaml
# Workflow: create_project — plantilla reutilizable (WORKFLOW_ENGINE.md §2)

name: create_project
description: "Crea un proyecto nuevo con repo, branch inicial, tests y documentacion"
keywords:
  - "crea un proyecto"
  - "crea una plataforma"
  - "nuevo proyecto"
  - "inicializa un proyecto"

tasks:
  - type: create_repository
    assigned_to: founder
    capability: create_repository

  - type: create_branch
    assigned_to: devops
    capability: create_branch
    depends_on: [create_repository]

  - type: run_tests
    assigned_to: devops
    capability: run_tests
    depends_on: [create_branch]

  - type: generate_documentation
    assigned_to: documentation
    capability: generate_documentation
    depends_on: [create_branch]

  - type: create_pull_request
    assigned_to: devops
    capability: create_pull_request
    depends_on: [run_tests, generate_documentation]